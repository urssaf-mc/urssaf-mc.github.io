<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URSSAF — Compte à rebours</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Orbitron:wght@500;700;900&family=Russo+One&family=Share+Tech+Mono&display=swap');

  *{margin:0;padding:0;box-sizing:border-box}

  body{
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    background:#06060b;
    padding:20px;
  }

  .poster{
    width:1100px;height:560px;
    position:relative;display:flex;overflow:hidden;
    border-radius:4px;
    border:2px solid rgba(198,40,40,.6);
    box-shadow:0 0 40px rgba(198,40,40,.2),0 0 120px rgba(198,40,40,.06),inset 0 0 100px rgba(0,0,0,.6);
    animation:border-glow 4s ease-in-out infinite;
  }
  @keyframes border-glow{
    0%,100%{box-shadow:0 0 40px rgba(198,40,40,.2),0 0 120px rgba(198,40,40,.06),inset 0 0 100px rgba(0,0,0,.6)}
    50%{box-shadow:0 0 70px rgba(198,40,40,.35),0 0 160px rgba(198,40,40,.1),inset 0 0 100px rgba(0,0,0,.6)}
  }
  .poster::before{
    content:'';position:absolute;inset:0;
    background:
      radial-gradient(ellipse at 20% 50%,rgba(198,40,40,.1) 0%,transparent 55%),
      radial-gradient(ellipse at 80% 40%,rgba(20,50,110,.12) 0%,transparent 45%),
      linear-gradient(135deg,#08081a 0%,#0c0e1e 40%,#0a0c18 70%,#060812 100%);
    z-index:0;
  }
  .poster::after{
    content:'';position:absolute;inset:0;
    background:
      repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(198,40,40,.025) 39px,rgba(198,40,40,.025) 40px),
      repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(198,40,40,.025) 39px,rgba(198,40,40,.025) 40px);
    z-index:1;pointer-events:none;
  }

  /* AMBIENT LAYERS */
  .vignette{position:absolute;inset:0;z-index:6;pointer-events:none;background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,.4) 100%);animation:vp 5s ease-in-out infinite}
  @keyframes vp{0%,100%{opacity:.7}50%{opacity:1}}

  .noise{
    position:absolute;inset:0;z-index:2;pointer-events:none;opacity:.03;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  /* LEFT PANEL */
  .left-panel{
    width:300px;min-width:300px;position:relative;z-index:2;
    display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
    padding:0 20px 24px;
    border-right:1px solid rgba(198,40,40,.3);
    background:
      linear-gradient(180deg,transparent 0%,transparent 30%,rgba(0,0,0,.7) 65%,rgba(0,0,0,.95) 100%);
  }
  .character-img{
    position:absolute;top:0;left:0;width:100%;height:100%;
    object-fit:cover;object-position:center top;z-index:-1;
    filter:brightness(.8) contrast(1.15) saturate(.9);
    animation:cb 6s ease-in-out infinite;
  }
  @keyframes cb{0%,100%{filter:brightness(.8) contrast(1.15) saturate(.9)}50%{filter:brightness(.65) contrast(1.25) saturate(.85)}}

  .agent-label{
    font-family:'Orbitron',sans-serif;font-weight:900;font-size:30px;color:#fff;letter-spacing:7px;
    text-shadow:0 0 25px rgba(198,40,40,.5),0 0 50px rgba(198,40,40,.15),0 2px 10px rgba(0,0,0,.95);
    margin-bottom:4px;animation:tg 3.5s ease-in-out infinite;
  }
  @keyframes tg{0%,100%{text-shadow:0 0 25px rgba(198,40,40,.5),0 0 50px rgba(198,40,40,.15),0 2px 10px rgba(0,0,0,.95)}50%{text-shadow:0 0 40px rgba(198,40,40,.75),0 0 80px rgba(198,40,40,.3),0 2px 10px rgba(0,0,0,.95)}}

  .agent-subtitle{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:5px;color:rgba(198,40,40,.8);text-transform:uppercase;margin-bottom:14px;text-shadow:0 1px 6px rgba(0,0,0,.9)}

  .left-meta{display:flex;align-items:center;gap:20px}
  .status-line{display:flex;align-items:center;gap:6px;font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(255,255,255,.5);letter-spacing:1px;text-shadow:0 1px 4px rgba(0,0,0,.8)}
  .status-dot{width:6px;height:6px;border-radius:50%;background:#c62828;box-shadow:0 0 8px rgba(198,40,40,.8);animation:pd 1.5s ease-in-out infinite}
  @keyframes pd{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.6)}}
  .threat-badge{padding:4px 12px;border:1px solid rgba(198,40,40,.5);font-family:'Orbitron',sans-serif;font-size:8px;font-weight:700;color:#c62828;letter-spacing:2px;text-transform:uppercase;background:rgba(0,0,0,.5);animation:tf 3s ease-in-out infinite}
  @keyframes tf{0%,100%{border-color:rgba(198,40,40,.5);background:rgba(0,0,0,.5)}50%{border-color:rgba(198,40,40,.9);background:rgba(198,40,40,.1)}}

  /* RIGHT PANEL */
  .right-panel{
    flex:1;position:relative;z-index:2;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:32px 40px;
  }

  .top-badge{
    font-family:'Orbitron',sans-serif;font-weight:700;font-size:9px;letter-spacing:6px;
    color:rgba(198,40,40,.6);text-transform:uppercase;
    margin-bottom:auto;align-self:flex-end;
  }

  /* COUNTDOWN */
  .countdown-wrap{
    display:flex;flex-direction:column;align-items:center;gap:0;
    margin:auto 0;
  }

  .countdown{display:flex;align-items:flex-end;gap:6px}

  .cd-block{
    display:flex;flex-direction:column;align-items:center;
    background:rgba(198,40,40,.04);
    border:1px solid rgba(198,40,40,.15);
    border-radius:4px;
    padding:12px 16px 8px;
    min-width:130px;
    position:relative;
    overflow:hidden;
  }
  .cd-block::before{
    content:'';position:absolute;top:0;left:0;right:0;height:1px;
    background:linear-gradient(90deg,transparent,rgba(198,40,40,.3),transparent);
  }

  .cd-value{
    font-family:'Orbitron',sans-serif;font-weight:900;font-size:68px;
    color:#fff;letter-spacing:2px;line-height:1;
    text-shadow:0 0 40px rgba(198,40,40,.4),0 0 80px rgba(198,40,40,.15);
    animation:cd-pulse 3s ease-in-out infinite;
  }
  @keyframes cd-pulse{
    0%,100%{text-shadow:0 0 40px rgba(198,40,40,.4),0 0 80px rgba(198,40,40,.15)}
    50%{text-shadow:0 0 60px rgba(198,40,40,.7),0 0 120px rgba(198,40,40,.3)}
  }
  .cd-label{
    font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:5px;
    color:rgba(198,40,40,.5);text-transform:uppercase;margin-top:6px;
  }

  .cd-sep{
    font-family:'Orbitron',sans-serif;font-weight:900;font-size:48px;
    color:rgba(198,40,40,.25);margin-bottom:22px;
    animation:blink 1.2s step-end infinite;
  }
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}

  /* BOTTOM */
  .bottom-bar{
    margin-top:auto;width:100%;
    display:flex;align-items:flex-end;justify-content:space-between;
  }

  .bottom-msg{
    font-family:'Chakra Petch',sans-serif;font-size:13px;
    color:rgba(255,255,255,.4);line-height:1.7;
  }
  .bottom-msg .threat{color:#e53935;font-weight:700}
  .bottom-msg .gold{color:#f9a825;font-weight:600}

  .sig-block{text-align:right}
  .sig-name{font-family:'Orbitron',sans-serif;font-weight:900;font-size:18px;color:#e53935;letter-spacing:5px;animation:sg 3s ease-in-out infinite}
  @keyframes sg{0%,100%{text-shadow:0 0 15px rgba(198,40,40,.25)}50%{text-shadow:0 0 30px rgba(198,40,40,.55),0 0 60px rgba(198,40,40,.15)}}
  .sig-role{font-family:'Share Tech Mono',monospace;font-size:8px;color:rgba(255,255,255,.2);letter-spacing:3px;margin-top:2px}

  /* OVERLAYS */
  .scanlines{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);z-index:3;pointer-events:none;animation:ss 10s linear infinite}
  @keyframes ss{0%{background-position:0 0}100%{background-position:0 200px}}

  .glitch-bar{position:absolute;left:0;right:0;height:2px;background:rgba(198,40,40,.25);z-index:7;pointer-events:none;opacity:0;animation:gs 7s ease-in-out infinite}
  @keyframes gs{0%,100%{top:-2px;opacity:0}4%{opacity:.7}12%{top:100%;opacity:0}13%,100%{opacity:0}}
  .glitch-bar:nth-child(2){animation-delay:3s}
  .glitch-bar:nth-child(3){animation-delay:5.5s;height:1px}

  .corner{position:absolute;z-index:4}
  .corner svg{width:20px;height:20px}
  .corner.tl{top:8px;left:8px}.corner.tr{top:8px;right:8px;transform:rotate(90deg)}.corner.bl{bottom:8px;left:8px;transform:rotate(-90deg)}.corner.br{bottom:8px;right:8px;transform:rotate(180deg)}

  .watermark{position:absolute;right:-50px;bottom:-50px;width:280px;height:280px;opacity:.02;z-index:1;animation:wr 80s linear infinite}
  @keyframes wr{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}

  .red-stripe{
    position:absolute;top:0;left:300px;width:3px;height:100%;z-index:5;
    background:linear-gradient(180deg,#c62828 0%,rgba(198,40,40,.05) 100%);
    box-shadow:0 0 12px rgba(198,40,40,.25);
    animation:sp 4s ease-in-out infinite;
  }
  @keyframes sp{0%,100%{box-shadow:0 0 12px rgba(198,40,40,.25)}50%{box-shadow:0 0 22px rgba(198,40,40,.5)}}

  /* MOBILE */
  @media(max-width:850px){
    body{padding:8px}
    .poster{width:100%;height:auto;flex-direction:column;border-width:2px}
    .red-stripe{top:auto;left:0;width:100%;height:3px;background:linear-gradient(90deg,#c62828,rgba(198,40,40,.05));position:relative}
    .left-panel{width:100%;min-width:unset;height:260px;border-right:none;border-bottom:1px solid rgba(198,40,40,.3);padding:0 16px 18px}
    .character-img{object-position:center 20%}
    .agent-label{font-size:24px;letter-spacing:5px}
    .agent-subtitle{font-size:8px;letter-spacing:3px;margin-bottom:10px}
    .right-panel{padding:20px 14px}
    .countdown{gap:4px;flex-wrap:wrap;justify-content:center}
    .cd-block{min-width:0;width:calc(50% - 14px);padding:10px 8px 6px}
    .cd-value{font-size:40px}
    .cd-sep{display:none}
    .cd-label{font-size:8px;letter-spacing:3px}
    .top-badge{font-size:7px;letter-spacing:4px;align-self:center;margin-bottom:12px}
    .bottom-bar{flex-direction:column;align-items:center;gap:12px;text-align:center}
    .sig-block{text-align:center}
    .bottom-msg{text-align:center;font-size:12px}
    .sig-name{font-size:15px;letter-spacing:3px}
    .corner svg{width:16px;height:16px}
    .corner.tl{top:5px;left:5px}.corner.tr{top:5px;right:5px}.corner.bl{bottom:5px;left:5px}.corner.br{bottom:5px;right:5px}
    .watermark{width:140px;height:140px;right:-20px;bottom:-20px}
  }
  @media(max-width:400px){
    .left-panel{height:200px}
    .agent-label{font-size:20px;letter-spacing:4px}
    .cd-value{font-size:32px}
    .bottom-msg{font-size:11px}
  }
</style>
</head>
